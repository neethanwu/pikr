# CI workflow for pikr.
# Generated by the /release skill. Adapt as needed.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: bun install --frozen-lockfile

      - run: bun vitest run tests/unit/

      - run: bun run build
